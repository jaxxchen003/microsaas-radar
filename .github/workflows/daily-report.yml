name: Daily Micro SaaS Radar Report

on:
  schedule:
    # 09:17 Asia/Shanghai daily. Avoid the top of the hour because
    # GitHub can delay or drop high-load scheduled workflows there.
    - cron: "17 1 * * *"
    # 10:47 Asia/Shanghai fallback run. It may commit again if fresh
    # source data changed, but protects the daily archive from missed runs.
    - cron: "47 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-report:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      TRUSTMRR_API_KEY: ${{ secrets.TRUSTMRR_API_KEY }}
      TZ: Asia/Shanghai

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Generate daily report
        run: |
          date
          date -u
          REPORT_DATE="$(date +%F)"
          python main.py --report-date "$REPORT_DATE" --max-analyze 50

      - name: Commit report updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/opportunities.csv output/index.html output/latest.html output/report.html output/reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Refresh daily Micro SaaS radar report"
            git pull --rebase origin main
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
