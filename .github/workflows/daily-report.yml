name: Daily Micro SaaS Radar Report

on:
  schedule:
    # Multiple morning attempts in Asia/Shanghai. GitHub scheduled workflows
    # can be delayed or occasionally skipped, so each schedule checks whether
    # today's report already exists before doing any expensive work.
    - cron: "37 23 * * *" # 07:37 Asia/Shanghai
    - cron: "37 0 * * *"  # 08:37 Asia/Shanghai
    - cron: "37 1 * * *"  # 09:37 Asia/Shanghai
    - cron: "37 2 * * *"  # 10:37 Asia/Shanghai
    - cron: "37 3 * * *"  # 11:37 Asia/Shanghai
    - cron: "37 4 * * *"  # 12:37 Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-report:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      ANYSEARCH_API_KEY: ${{ secrets.ANYSEARCH_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      TRUSTMRR_API_KEY: ${{ secrets.TRUSTMRR_API_KEY }}
      TZ: Asia/Shanghai

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Decide whether to generate
        id: report
        run: |
          REPORT_DATE="$(date +%F)"
          echo "date=$REPORT_DATE" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "output/reports/$REPORT_DATE.html" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Report for $REPORT_DATE already exists; skipping scheduled refresh."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Generating report for $REPORT_DATE."
          fi

      - name: Set up Python
        if: steps.report.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.report.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run tests
        if: steps.report.outputs.run == 'true'
        run: python -m unittest discover -s tests

      - name: Generate daily report
        if: steps.report.outputs.run == 'true'
        run: |
          date
          date -u
          REPORT_DATE="${{ steps.report.outputs.date }}"
          python main.py --report-date "$REPORT_DATE" --max-analyze 50

      - name: Commit report updates
        if: steps.report.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/opportunities.csv output/index.html output/latest.html output/report.html output/reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Refresh daily Micro SaaS radar report"
            git pull --rebase origin main
            git push
          fi

      - name: Configure GitHub Pages
        if: steps.report.outputs.run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.report.outputs.run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        if: steps.report.outputs.run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
